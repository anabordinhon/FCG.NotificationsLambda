name: Deploy Lambda .NET

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy para AWS Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0'

      - name: Instalar ferramentas Lambda .NET
        run: dotnet tool install -g Amazon.Lambda.Tools

      - name: Restaurar dependências
        run: dotnet restore

      - name: Deploy da Lambda
        run: |
          dotnet lambda deploy-function fcg-email-lambda \
            --region us-east-1 \
            --function-role arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/LabRole \
            --framework net8.0 \
            --function-runtime dotnet8 \
            --function-handler "AWSLambdaEmail::AWSLambdaEmail.Function::FunctionHandler" \
            --function-memory-size 256 \
            --function-timeout 30 \
            --environment-variables "SNS_TOPIC_ARN=${{ secrets.SNS_TOPIC_ARN }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: us-east-1
